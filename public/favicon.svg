<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Accent Gradient -->
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5500" />
      <stop offset="100%" stop-color="#FFAA00" />
    </linearGradient>
    
    <!-- Dark Background -->
    <linearGradient id="favBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
  </defs>

  <!-- Dark Badge Base -->
  <rect width="128" height="128" rx="36" fill="url(#favBg)" stroke="#334155" stroke-width="2" />

  <!-- Simplified Flow loop -->
  <path d="M 32 64 C 32 40, 96 40, 96 64 C 96 88, 32 88, 32 64 Z" 
        fill="none" 
        stroke="url(#favGrad)" 
        stroke-width="10" 
        stroke-linecap="round" />

  <!-- Center Pin and Focus Hands -->
  <circle cx="64" cy="64" r="5" fill="#FFFFFF" />
  <line x1="64" y1="64" x2="64" y2="48" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" />
  <line x1="64" y1="64" x2="76" y2="64" stroke="#FFAA00" stroke-width="4" stroke-linecap="round" />
</svg>
